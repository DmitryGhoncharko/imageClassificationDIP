services:
  db:
    image: postgres:16
    container_name: image-dam-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: image_dam
      POSTGRES_USER: image_user
      POSTGRES_PASSWORD: image_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U image_user -d image_dam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

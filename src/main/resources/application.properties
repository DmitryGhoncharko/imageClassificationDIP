spring.application.name=imageClassification
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/image_dam}
spring.datasource.username=${DB_USER:image_user}
spring.datasource.password=${DB_PASSWORD:image_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload-dir=${APP_UPLOAD_DIR:uploads}

app.inference.top-tags=${INFERENCE_TOP_TAGS:2}

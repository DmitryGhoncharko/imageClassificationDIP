<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Мои фото</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<div class="container app-shell">
    <header class="top app-top">
        <div>
            <h1>DAM - Мои фото</h1>
            <p class="muted">Управляй своей библиотекой изображений</p>
        </div>
        <div class="menu app-menu">
            <span class="chip" th:text="'Пользователь: ' + ${username}"></span>
            <a th:if="${isAdmin}" th:href="@{/admin}" class="link-button">Админка</a>
            <form method="post" th:action="@{/logout}" class="inline-form">
                <button type="submit" class="secondary">Выйти</button>
            </form>
        </div>
    </header>

    <p class="ok banner" th:if="${param.uploaded}">Файлы загружены.</p>
    <p class="ok banner" th:if="${param.deleted}">Фото удалено.</p>
    <p class="ok banner" th:if="${param.tagsUpdated}">Теги обновлены.</p>
    <p class="ok banner" th:if="${param.autoTaggedAll}" th:text="'Автотегировано фото: ' + ${param.autoTaggedAll[0]}"></p>
    <p class="error banner" th:if="${error}" th:text="${error}"></p>

    <section class="panel">
        <form method="post" th:action="@{/photos/autotag-all}" class="inline-form">
            <button type="submit">Автотегировать все непротегированные (ResNet)</button>
        </form>
    </section>

    <section class="panel">
        <form method="get" th:action="@{/photos}" class="form search-form">
            <input type="hidden" name="size" th:value="${photoPage.size}">
            <div class="field-row">
                <label>Поиск по названию
                    <input type="text" name="name" th:value="${name}" placeholder="Например: vacation">
                </label>
                <label>Поиск по тегу
                    <input type="text" name="tag" th:value="${tag}" placeholder="Например: море">
                </label>
            </div>
            <div class="action-row">
                <button type="submit">Искать</button>
                <a th:href="@{/photos}" class="link-button">Сбросить</a>
            </div>
        </form>
    </section>

    <section class="panel">
        <form method="post" enctype="multipart/form-data" th:action="@{/photos/upload}" class="form upload-form" id="uploadForm">
            <div class="field-row">
                <label>Выбери фото (можно несколько)
                    <input type="file" name="files" id="uploadFiles" accept="image/*" multiple required>
                </label>
                <label>Теги для всех загружаемых фото
                    <input type="text" name="tags" id="uploadTags" placeholder="семья, лето, море">
                </label>
            </div>
            <div class="action-row">
                <button type="submit">Загрузить батч</button>
                <span class="muted" id="fileCounter">Файлы не выбраны</span>
            </div>
            <div class="tags-preview" id="uploadTagsPreview"></div>
        </form>
    </section>

    <section class="panel">
        <form method="post" enctype="multipart/form-data" th:action="@{/photos/similar/upload}" class="form">
            <div class="field-row">
                <label>Поиск похожих по загруженному примеру
                    <input type="file" name="sample" accept="image/*" required>
                </label>
            </div>
            <div class="action-row">
                <button type="submit">Найти похожие</button>
            </div>
        </form>
    </section>

    <div class="photo-summary muted" th:text="'Найдено фото: ' + ${photoPage.totalItems}"></div>

    <div class="grid">
        <div class="card" th:each="photo : ${photos}">
            <img th:src="@{'/files/' + ${photo.storedFileName}}" th:alt="${photo.originalFileName}">
            <div class="meta">
                <strong th:text="${photo.originalFileName}"></strong>
                <span th:text="${#temporals.format(photo.uploadedAt, 'dd.MM.yyyy HH:mm')}"></span>
                <div class="tags-list">
                    <span class="tag-chip"
                          th:if="${photo.tags.isEmpty()}">без тегов</span>
                    <button type="button"
                            class="tag-chip interactive"
                            th:each="tagItem : ${photo.tags}"
                            th:attr="data-tag=${tagItem}"
                            th:text="${tagItem}"></button>
                </div>
                <div class="card-actions">
                    <button type="button" class="secondary small js-toggle-tags">Теги</button>
                    <button type="button" class="secondary small js-toggle-crop">Поиск по участку</button>
                    <form method="post" th:action="@{'/photos/' + ${photo.id} + '/delete'}" class="inline-form">
                        <button type="submit" class="danger small">Удалить</button>
                    </form>
                </div>
                <form method="post"
                      th:action="@{'/photos/' + ${photo.id} + '/tags'}"
                      class="edit-tags-form hidden">
                    <label>Обновить теги
                        <input type="text" name="tags" th:value="${#strings.listJoin(photo.tags, ', ')}">
                    </label>
                    <button type="submit" class="small">Сохранить теги</button>
                </form>
                <form method="post"
                      th:action="@{'/photos/' + ${photo.id} + '/similar/crop'}"
                      class="crop-search-form hidden">
                    <div class="crop-box js-crop-box">
                        <img th:src="@{'/files/' + ${photo.storedFileName}}" th:alt="${photo.originalFileName}" class="crop-image js-crop-image">
                        <div class="crop-rect js-crop-rect"></div>
                    </div>
                    <input type="hidden" name="cropX" value="0.25" class="js-crop-x">
                    <input type="hidden" name="cropY" value="0.25" class="js-crop-y">
                    <input type="hidden" name="cropW" value="0.5" class="js-crop-w">
                    <input type="hidden" name="cropH" value="0.5" class="js-crop-h">
                    <button type="submit" class="small">Найти похожие по выделению</button>
                </form>
            </div>
        </div>
    </div>

    <section class="panel" th:if="${!#lists.isEmpty(similarResults)}">
        <h2>Похожие изображения</h2>
        <div class="grid">
            <div class="card" th:each="item : ${similarResults}">
                <img th:src="@{'/files/' + ${item.photo.storedFileName}}" th:alt="${item.photo.originalFileName}">
                <div class="meta">
                    <strong th:text="${item.photo.originalFileName}"></strong>
                    <span th:text="'Схожесть: ' + ${#numbers.formatDecimal(item.score * 100, 1, 1)} + '%'"></span>
                </div>
            </div>
        </div>
    </section>

    <nav class="pagination" th:if="${photoPage.totalPages > 1}">
        <a th:if="${photoPage.hasPrevious}"
           th:href="@{/photos(page=${photoPage.page - 1},size=${photoPage.size},name=${name},tag=${tag})}">Назад</a>
        <span th:unless="${photoPage.hasPrevious}" class="disabled">Назад</span>

        <span class="page-info"
              th:text="'Страница ' + ${photoPage.page + 1} + ' из ' + ${photoPage.totalPages}"></span>

        <a th:if="${photoPage.hasNext}"
           th:href="@{/photos(page=${photoPage.page + 1},size=${photoPage.size},name=${name},tag=${tag})}">Вперед</a>
        <span th:unless="${photoPage.hasNext}" class="disabled">Вперед</span>
    </nav>
</div>
</body>
</html>
